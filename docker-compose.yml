services:
  selfauthenticator:
    image: ghcr.io/s3lfcod3r/selfauthenticator:latest
    container_name: selfauthenticator
    ports:
      - "${PORT:-8091}:8091"
    environment:
      # PFLICHT: 64-stelliges Hex-Secret. Erzeugen mit:
      #   python -c "import secrets; print(secrets.token_hex(32))"
      # Compose bricht ab, wenn die Variable fehlt (statt leeres Secret zu uebergeben).
      SELFAUTH_SECRET: ${SELFAUTH_SECRET:?SELFAUTH_SECRET muss gesetzt sein - erzeugen mit: python -c "import secrets; print(secrets.token_hex(32))"}
      # Nach Anlegen deines Accounts auf false setzen, um die Registrierung zu schliessen.
      SELFAUTH_ALLOW_REGISTRATION: ${SELFAUTH_ALLOW_REGISTRATION:-true}
      TZ: ${TZ:-Europe/Berlin}
    volumes:
      - ./data:/data
    restart: unless-stopped
